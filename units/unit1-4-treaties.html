    <h3>四、適用於香港的國際協議</h3>
    <ul>
      <li><strong>適用機制：</strong>中國締結的國際協議，中央人民政府可根據香港特區的情況和需要，在<strong>徵詢香港特區政府的意見後</strong>，決定是否適用於香港。</li>
      <li><strong>核心公約：</strong>
        <ul>
          <li>保障兒童：<strong>《兒童權利公約》</strong>。</li>
          <li>消除偏見與歧視：<strong>《消除一切形式種族歧視國際公約》</strong>、<strong>《消除對婦女一切形式歧視公約》</strong>、<strong>《殘疾人權利公約》</strong>。</li>
        </ul>
      </li>
    </ul>
